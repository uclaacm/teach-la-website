# --- Block 1: The HTTP Redirect ---
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Force all Port 80 traffic to redirect to Port 443 (HTTPS)
    return 301 https://$host$request_uri;
}

# --- Block 2: The HTTPS Server ---
server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # Point Nginx to the certificates we mounted in the docker-compose file
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Strong SSL Security Settings (Standard best practices)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Express API Routing
    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https; # Tells Express the original request was secure
    }

    # 2. Next.js Dynamic App Routing
    location /app/ {
        proxy_pass http://next_frontend:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /_next/ {
        proxy_pass http://next_frontend:3000/_next/;
    }

    # 3. Jekyll Static Site
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
    
    error_page 404 /404.html

}